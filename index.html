<!DOCTYPE html><html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>For Hanishaa</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet"><style>
body{
font-family:'Poppins',sans-serif;
background:linear-gradient(135deg,#ffc6d9,#ffdce8,#ffeef5);
height:100vh;
margin:0;
display:flex;
align-items:center;
justify-content:center;
overflow:hidden;
}

.card{
background:white;
padding:55px;
border-radius:26px;
box-shadow:0 25px 60px rgba(0,0,0,.18);
max-width:680px;
width:90%;
text-align:center;
animation:fadeIn 1.2s ease;
position:relative;
z-index:2;
}

h1{
margin-top:0;
font-weight:600;
color:#ff4d88;
font-size:38px;
}

p{
font-size:19px;
line-height:1.7;
color:#444;
}

.buttons{
margin-top:30px;
display:flex;
gap:18px;
flex-wrap:wrap;
justify-content:center;
}

button{
padding:16px 26px;
border:none;
border-radius:14px;
cursor:pointer;
font-size:17px;
font-family:'Poppins',sans-serif;
transition:.25s;
}

button:hover{transform:scale(1.1)}

.good{background:#ff6fa3;color:white}
.truth{background:#ff8fab;color:white}
.smile{background:#ffb3c6;color:white}
.secret{background:#ff4d88;color:white}
.final{background:#ff2e73;color:white}

.message{
margin-top:28px;
font-weight:500;
min-height:70px;
font-size:20px;
color:#333;
}

.hidden{
display:none;
margin-top:24px;
font-style:italic;
color:#555;
font-size:19px;
}

.heart{
position:absolute;
color:#ff4d88;
font-size:20px;
animation:float 6s linear infinite;
}

.petal{
position:absolute;
width:14px;
height:14px;
background:#ff9ec4;
border-radius:50% 50% 50% 0;
opacity:0.9;
animation:fall linear forwards;
}

@keyframes fall{
0%{transform:translateY(-10vh) rotate(0deg);opacity:1}
100%{transform:translateY(110vh) rotate(360deg);opacity:0.6}
}

@keyframes float{
0%{transform:translateY(100vh) scale(.5);opacity:0}
10%{opacity:1}
100%{transform:translateY(-10vh) scale(1.3);opacity:0}
}

@keyframes fadeIn{
from{opacity:0;transform:translateY(25px)}
to{opacity:1;transform:translateY(0)}
}
</style></head><body><div class="card"><h1>Hey Hanishaa 🌸</h1><p>
I made this small page for you. Click the buttons below. Each one contains something I wanted to say.
</p><div class="buttons"><button class="good" onclick="typeMessage('You are a kind and genuine person. Rumours cannot change who you truly are.')">
Who you really are
</button><button class="truth" onclick="typeMessage('Sometimes people talk without knowing the truth. The truth about someone always matters more than rumours.')">
About rumours
</button><button class="smile" onclick="typeMessage('Your smile and your personality are much brighter than the negativity around you.')">
Your smile
</button><button class="secret" onclick="typeMessage('Just so you know, there are people who truly believe in you and support you. I am one of them.')">
A small secret
</button><button class="final" onclick="revealFinal()">
One last thing
</button></div><div class="message" id="msg"></div><div class="hidden" id="finalMsg">
Sometimes the strongest people are the ones who face rumours but still remain kind and positive.I really admire that about you. 💗

</div></div><script>

function typeMessage(text){
let msg=document.getElementById("msg");
msg.innerHTML="";
let i=0;
let interval=setInterval(()=>{
msg.innerHTML+=text.charAt(i);
i++;
if(i>=text.length){clearInterval(interval)}
},35);
}

function revealFinal(){
document.getElementById("finalMsg").style.display="block";
typeMessage("There is one more thing I wanted you to know...");
}

function createHeart(){
const heart=document.createElement('div');
heart.classList.add('heart');
heart.innerHTML='❤';
heart.style.left=Math.random()*100+'vw';
heart.style.fontSize=(Math.random()*22+12)+'px';
document.body.appendChild(heart);
setTimeout(()=>{heart.remove()},6000);
}

function createPetal(){
const petal=document.createElement('div');
petal.classList.add('petal');
petal.style.left=Math.random()*100+'vw';
petal.style.animationDuration=(Math.random()*5+5)+'s';

document.body.appendChild(petal);
setTimeout(()=>{petal.remove()},10000);
}

setInterval(createHeart,700);
setInterval(createPetal,300);

</script></body>
</html>
